<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Inaccuracies - Snow Removal</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <h1>Snow Removal Service</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="map.html">Map</a></li>
                <li><a href="report.html">Report Issues</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Report an Issue</h2>

        <!-- Helpful instruction -->
        <p><strong>Tip:</strong> Click a sidewalk on the map to auto-fill this form.</p>

        <form id="reportForm">

            <!-- Hidden sidewalk ID -->
            <input type="hidden" id="sidewalkId" name="sidewalkId">

            <label for="location">Location:</label>
            <input type="text" id="location" name="location" placeholder="select from map" required>
            <span class="error-message" id="locationError"></span>
            
            <label for="severity">Severity:</label>
            <select id="severity" name="severity" required>
                <option value="">--Select--</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
                <option value="unknown">Unknown</option>
            </select>
            <span class="error-message" id="severityError"></span>

            <label for="comments">Other comments:</label>
            <textarea id="comments" name="comments" placeholder="Describe the issue..."></textarea>
            <span class="error-message" id="commentsError"></span>
            
            <button type="submit">Submit Report</button>
        </form>
    </main>

    <script src="../js/form.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Key</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="map-key">
        <h2>Map Key for Snow Depth and Removal Status</h2>
        <ul>
            <li><span class="key-indicator" style="background-color: #00FF00;"></span> Clear - No snow</li>
            <li><span class="key-indicator" style="background-color: #FFFF00;"></span> Light Snow - Less than 2 inches</li>
            <li><span class="key-indicator" style="background-color: #FFA500;"></span> Moderate Snow - 2 to 6 inches</li>
            <li><span class="key-indicator" style="background-color: #FF0000;"></span> Heavy Snow - More than 6 inches</li>
            <li><span class="key-indicator" style="background-color: #0000FF;"></span> In Progress - Currently being cleared</li>
            <li><span class="key-indicator" style="background-color: #808080;"></span> Not Cleared - No action taken</li>
        </ul>
    </div>
</body>
</html>

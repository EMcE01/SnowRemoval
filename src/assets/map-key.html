<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Key</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="map-key">
        <ul>
            <li><span class="key-indicator" style="background-color: #00FF00;"></span> Green: Clear - No snow</li>
            <li><span class="key-indicator" style="background-color: #FFFF00;"></span> Yellow: Light Snow - Less than 2 inches</li>
            <li><span class="key-indicator" style="background-color: #FFA500;"></span> Orange: Moderate Snow - 2 to 6 inches</li>
            <li><span class="key-indicator" style="background-color: #FF0000;"></span> Red: Heavy Snow - More than 6 inches</li>
            <li><span class="key-indicator" style="background-color: #0000FF;"></span> Blue: In Progress - Currently being cleared</li>
        </ul>
    </div>
</body>
</html>
